name: Build and Package

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Verify Java and jpackage
        run: |
          java --version
          jpackage --version

      - name: Build with Maven
        run: mvn clean package

      - name: List target directory
        run: dir target

      - name: List input-pv directory
        run: dir input-pv

      - name: Create installer with jpackage
        run: |
          jpackage `
            --type exe `
            --input input-pv `
            --name PornViewer `
            --main-jar PornViewer.jar `
            --main-class com.plovdev.pornviewer.Launcher `
            --dest installer `
            --resource-dir resources-pv `
            --icon files/PornViewer.ico `
            --license-file files/LICENSE.txt `
            --app-version "1.7.5" `
            --vendor "PlovDev" `
            --copyright "© 2026 PlovDev. Все права защищены." `
            --description "Безопасный и анонимный просмотр видео 18+ с шифрованием и поддержкой плагинов" `
            --java-options "-Xmx2G" `
            --java-options "-Dfile.encoding=UTF-8" `
            --file-associations files/video-assoc.properties `
            --win-dir-chooser `
            --win-shortcut `
            --win-menu `
            --verbose

      - name: Upload Windows installer
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: installer/*.exe
          if-no-files-found: error

      - name: Upload Windows installer to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: installer/*.exe
          tag_name: ${{ github.ref_name }}