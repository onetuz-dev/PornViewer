name: Build and Package

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Verify Java and jpackage
        run: |
          java --version
          jpackage --version

      - name: Build with Maven
        run: mvn clean package

      - name: List target directory
        run: dir target

      - name: List input-pv directory
        run: dir input-pv

      - name: Create JRE
        run: |
          if (Test-Path "files\pv-jre-win") { Remove-Item -Recurse -Force files\pv-jre-win }
          jlink --add-modules java.base,jdk.crypto.ec,jdk.httpserver,java.desktop,java.logging,java.net.http,java.sql,jdk.unsupported `
          --strip-debug --no-header-files --no-man-pages --compress=zip-9 `
          --output files\pv-jre-win
          if (Test-Path "files\pv-jre-win\legal") { Remove-Item -Recurse -Force files\pv-jre-win\legal }

      - name: Create App image
        run: |
          jpackage `
            --type app-image `
            --input input-pv `
            --name PornViewer `
            --main-jar PornViewer.jar `
            --main-class com.plovdev.pornviewer.Launcher `
            --runtime-image files\pv-jre-win `
            --dest installer `
            --resource-dir resources-pv `
            --icon files\PornViewer.ico `
            --app-version "1.7.5" `
            --vendor "PlovDev" `
            --copyright "© 2026 PlovDev. Все права защищены." `
            --description "Безопасный и анонимный просмотр видео 18+ с шифрованием и поддержкой плагинов" `
            --java-options "-Xmx2G" `
            --java-options "-Dfile.encoding=UTF-8" `
            --win-dir-chooser `
            --win-shortcut `
            --win-menu `
            --verbose

      - name: Compile Inno Setup Installer
        run: |
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" resources-pv/installer.iss

      - name: Upload Windows installer
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: installer/*.exe
          if-no-files-found: error